# Fait par Gillesto
# mkdocs.yml — Configuration de la documentation SafeRoute
#
# Génère la documentation HTML à partir des docstrings Google.
# Commandes :
#   mkdocs build --strict   ← build de production (erreur si warning)
#   mkdocs serve            ← prévisualisation locale sur http://127.0.0.1:8000
#   mkdocs gh-deploy        ← déploiement sur GitHub Pages

site_name: SafeRoute
site_description: "Bibliothèque de routage piéton sûr multi-objectif — A*pex, KDE, Pareto"
site_author: Gillesto
site_url: https://gillesto66.github.io/SafeRoute/
repo_url: https://github.com/Gillesto66/SafeRoute
repo_name: Gillesto66/SafeRoute
edit_uri: edit/main/docs/

# Nécessaire pour GitHub Pages avec sous-répertoire
use_directory_urls: true

# Thème Material — moderne, responsive, recherche intégrée
theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

# Plugins
plugins:
  - search:
      lang: fr
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true

# Extensions Markdown
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

# Navigation
nav:
  - Accueil: index.md
  - Installation: installation.md
  - Guide rapide: quickstart.md
  - Référence API:
      - SafeRouteEngine: api/engine.md
      - Modèles: api/models.md
      - Exceptions: api/exceptions.md
      - Cache: api/graph_cache.md
      - KDE Scorer: api/kde_scorer.md
      - Familiarité: api/familiarity.md
  - Architecture: architecture.md
  - Contribution: contributing.md
  - Changelog: changelog.md
