# Fait par Gillesto
# ci.yml — Pipeline CI/CD GitHub Actions (structure src-layout)

name: SafeRoute CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Tests Python ────────────────────────────────────────────────────
  test-python:
    name: Tests Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install osmnx networkx geopandas shapely scipy numpy \
                      fastapi "uvicorn[standard]" pydantic httpx \
                      matplotlib folium platformdirs \
                      pytest pytest-asyncio pytest-mock

      - name: Lancer pytest
        run: python -m pytest tests/ -v --tb=short
        working-directory: SafeRoute

  # ── Job 2 : Tests Rust ──────────────────────────────────────────────────────
  test-rust:
    name: Tests Rust (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            SafeRoute/src/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('SafeRoute/src/rust/Cargo.toml') }}

      - name: Vérification formatage
        run: cargo fmt --check
        working-directory: SafeRoute/src/rust

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: SafeRoute/src/rust

      - name: Tests unitaires et d'intégration
        run: cargo test --verbose
        working-directory: SafeRoute/src/rust

  # ── Job 3 : Build wheel maturin ─────────────────────────────────────────────
  build-wheel:
    name: Build wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [test-python, test-rust]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Installer maturin
        run: pip install maturin

      - name: Build wheel
        run: python -m maturin build --release --out dist/
        working-directory: SafeRoute

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: SafeRoute/dist/*.whl
